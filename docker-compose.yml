services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audax
      POSTGRES_PASSWORD: audax
      POSTGRES_DB: audax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/drizzle/0000_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./apps/api/drizzle/0001_seed_mock_coupons.sql:/docker-entrypoint-initdb.d/002_seed_mock_coupons.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audax -d audax"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
